services:
  postgres:
    image: postgres:15
    container_name: heds-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPORT: ${POSTGRES_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - heds-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: heds-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:${POSTGRES_PORT}/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_URL}
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_PROXY_HEADERS: xforwarded
      KC_SMTP_HOST: ${SMTP_HOST}
      KC_SMTP_FROM: ${SMTP_FROM}
      KC_SMTP_PORT: ${SMTP_PORT}
    depends_on:
      - postgres
    networks:
      - heds-network
      - prod
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.heds-keycloak.rule=Host(`auth.heds.ehealth.hevs.ch`)"
      - "traefik.docker.network=prod"
      - "traefik.http.services.heds-keycloak.loadbalancer.server.port=8080"

  mailhog:
    image: mailhog/mailhog
    container_name: heds-mailhog
    networks:
      - heds-network

  backend:
    build: ./backend
    container_name: heds-backend
    environment:
      - FRONTEND_URL=${FRONTEND_URL}
    networks:
      - heds-network
      - prod
    depends_on:
      - keycloak
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.heds-backend.rule=Host(`api.heds.ehealth.hevs.ch`)"
      - "traefik.docker.network=prod"
      - "traefik.http.services.heds-backend.loadbalancer.server.port=8000"

  frontend:
    build: ./frontend
    container_name: heds-frontend
    networks:
      - heds-network
      - prod
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.heds-frontend.rule=Host(`heds.ehealth.hevs.ch`)"
      - "traefik.docker.network=prod"
      - "traefik.http.services.heds-frontend.loadbalancer.server.port=80"

networks:
  heds-network:
    driver: bridge
  prod:
    external: true

volumes:
  postgres_data:
