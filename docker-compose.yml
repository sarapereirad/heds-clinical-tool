services:
  postgres:
    image: postgres:15
    container_name: heds-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - heds-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: heds-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    depends_on:
      - postgres
    networks:
      - heds-network

  mailhog:
    image: mailhog/mailhog
    container_name: heds-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - heds-network

  backend:
    build: ./backend
    container_name: heds-backend
    ports:
      - "8000:8000"
    networks:
      - heds-network
    depends_on:
      - keycloak

  frontend:
    build: ./frontend
    container_name: heds-frontend
    ports:
      - "5173:80"
    networks:
      - heds-network
    depends_on:
      - backend

networks:
  heds-network:
    driver: bridge

volumes:
  postgres_data:
